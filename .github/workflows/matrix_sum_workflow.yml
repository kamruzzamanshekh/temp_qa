name: Matrix Sum Workflow

on:
  push:
    branches:
      - main

jobs:
  matrix_sum_job:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Python setup
        uses: actions/setup-python@v4   # <-- fixed typo '=' → '@'
        with:
          python-version: '3.12'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the matrix.py file
      - name: Run matrix.py
        run: |
          python matrix.py